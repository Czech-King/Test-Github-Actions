name: Artifact Demo

on:
  workflow_dispatch

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - run: echo "Hello" > app.txt

      - uses: actions/upload-artifact@v4
        with:
          name: app-file
          path: app.txt

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-file

      - run: cat app.txt
